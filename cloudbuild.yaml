steps:
- name: 'google/cloud-sdk'
  args:
  - gcloud
  - functions
  - deploy
  - imf-qnea-ingestor
  - --gen2
  - --region=australia-southeast2
  - --runtime=python310
  - --source=./ingestors/imf_qnea
  - --entry-point=ingest_imf_data
  - --trigger-http
  - --no-allow-unauthenticated
  - --memory=1024Mi
  - --timeout=540s

- name: 'google/cloud-sdk'
  args:
  - gcloud
  - functions
  - deploy
  - rss-ingestor
  - --gen2
  - --region=australia-southeast2
  - --runtime=python310
  - --source=./ingestors/rss
  - --entry-point=ingest_rss
  - --trigger-http
  - --no-allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY