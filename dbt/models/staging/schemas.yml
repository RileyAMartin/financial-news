version: 2

models:
  - name: stg_rss
    description: "Cleaned RSS feed entries from BigQuery"
    columns:
      - name: feed_name
        description: "The name of the article's RSS feed"
        data_tests:
        - not_null

      - name: link
        description: "The unique URL for the news article"
        data_tests:
          - not_null
          - unique

      - name: title
        description: "The title of the news article"
        data_tests:
          - not_null

      - name: summary
        description: "A summary of the news article"

      - name: published_at
        description: "Timestamp when the article was published"
        data_tests:
          - not_null
  
  - name: stg_imf_qnea
    description: "National Economic Accounts (Quarterly) data from the IMF."
    columns:
      - name: country_code
        description: "The 3 letter abbreviated country code for this value."
        data_tests:
          - not_null
      
      - name: indicator_code
        description: "The code of the economic indicator for this value."
        data_tests:
          - not_null
      
      - name: period_end_date
        description: "The date of the last day for this row's period."
        tests:
          - not_null
        
      - name: frequency
        description: "The frequency for each value. Always 'Q' (quarterly)"
        tests:
          - not_null
      
      - name: obs_value
        description: "The seasonally adjusted observed value, represented in the country's local currency (XDC)."
        data_tests:
          - not_null

      - name: is_inflation_adjusted
        description: "(Boolean value) True if the observed value is adjusted for inflation, False if the observed value represents current prices."
        data_tests:
          - not_null
  
  - name: stg_imf_fx
    description: "Exchange rate data from the IMF."
    columns:
      - name: country_code
        description:
          "The 3-letter country abbreviation for this row."
        tests:
        - not_null
      
      - name: indicator_code
        description: "The type of exchange rate metric. Either local currency to USD (USD_XDC) or local currency to EUR (USD_XDC)"
        tests:
          - not_null
      
      - name: period_end_date
        description: "The date of the last day for this row's period."
        tests:
          - not_null
        
      - name: frequency
        description: "The frequency for each value. Always 'Q' (quarterly)"
        tests:
          - not_null

      - name: obs_value
        description: "The numerical observed value for this time period."
        tests:
          - not_null

