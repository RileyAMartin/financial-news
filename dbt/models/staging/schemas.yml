version: 2

models:
  - name: stg_news
    description: "Cleaned RSS feed entries from BigQuery."
    columns:
      - name: ingested_at
        description: "The timestamp when this record was originally loaded into BigQuery."
        data_tests:
          - not_null

      - name: feed_name
        description: "The name of the RSS feed the article was retrieved from."
        data_tests:
          - not_null

      - name: url
        description: "The unique URL for the news article, serving as the natural primary key."
        data_tests:
          - not_null
          - unique

      - name: title
        description: "The title of the news article."
        data_tests:
          - not_null

      - name: summary
        description: "A short summary or snippet of the article content."

      - name: published_at
        description: "Timestamp when the article was published by the source."
        data_tests:
          - not_null

  - name: stg_imf_qnea
    description: "Quarterly National Economic Accounts (QNEA) data from the IMF, filtered to seasonally adjusted values in local currency."
    columns:
      - name: country_code
        description: "The 3-letter abbreviated country code for this value."
        data_tests:
          - not_null

      - name: indicator_code
        description: "The code of the economic indicator for this value."
        data_tests:
          - not_null

      - name: period_end_date
        description: "The date of the last day of this row's quarter."
        data_tests:
          - not_null

      - name: frequency
        description: "The frequency of the observation. Always 'Q' (quarterly)."
        data_tests:
          - not_null

      - name: obs_value
        description: "The seasonally adjusted observed value in the country's local currency (XDC)."
        data_tests:
          - not_null

      - name: is_inflation_adjusted
        description: "True if the observed value is adjusted for inflation (constant prices); False if it represents current prices."
        data_tests:
          - not_null

      - name: ingested_at
        description: "The timestamp when this record was originally loaded into BigQuery."
        data_tests:
          - not_null

  - name: stg_fx
    description: "Daily FX OHLC rates from the raw fx table, normalized to USD quote currency."
    columns:
      - name: date_day
        description: "The calendar date for this daily FX observation."
        data_tests:
          - not_null

      - name: base_currency_code
        description: "The ISO 4217 base currency code being priced."
        data_tests:
          - not_null

      - name: quote_currency_code
        description: "The ISO 4217 quote currency code. Filtered to USD in this model."
        data_tests:
          - not_null

      - name: open_price
        description: "Opening price for the day."

      - name: high_price
        description: "Highest traded price for the day."

      - name: low_price
        description: "Lowest traded price for the day."

      - name: close_price
        description: "Closing price for the day, used for quarter period-average calculations."
        data_tests:
          - not_null

      - name: ingested_at
        description: "The timestamp when this record was originally loaded into BigQuery."
        data_tests:
          - not_null

      - name: source_code
        description: "The identifier of the data source for this row."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sources')
                field: source_code