version: 2

models:
  - name: dim_currencies
    description: "Dimension table of country-level local currencies, sourced from the currencies seed."
    columns:
      - name: currency_code
        description: "The 3-letter ISO 4217 currency code for the country."
        data_tests:
          - not_null
          - assert_string_length:
              expected_length: 3

      - name: currency_name
        description: "Human-readable currency name for the country."
        data_tests:
          - not_null

      - name: processed_at
        description: "The timestamp when this dimension row was processed in dbt."
        data_tests:
          - not_null

  - name: dim_countries
    description: "Dimension table of countries tracked in the pipeline, sourced from the IMF country abbreviations seed."
    columns:
      - name: country_code
        description: "The 3-letter ISO country code, serving as the primary key."
        data_tests:
          - unique
          - not_null
          - assert_string_length:
              arguments:
                expected_length: 3

      - name: official_name
        description: "The official country name as defined by the IMF."
        data_tests:
          - not_null

      - name: display_name
        description: "A shortened or common name used for display purposes."
        data_tests:
          - not_null

      - name: processed_at
        description: "The timestamp when this dimension row was processed in dbt."
        data_tests:
          - not_null

      - name: currency_code
        description: "The 3-letter ISO 4217 currency code for the country."
        data_tests:
          - not_null
          - assert_string_length:
              expected_length: 3


  - name: dim_indicators
    description: "Dimension table of QNEA economic indicators tracked in the pipeline."
    columns:
      - name: indicator_code
        description: "The IMF indicator code, serving as the primary key."
        data_tests:
          - unique
          - not_null

      - name: name
        description: "A short human-readable name for the indicator."
        data_tests:
          - not_null

      - name: description
        description: "A detailed description of what the indicator measures."

      - name: processed_at
        description: "The timestamp when this dimension row was processed in dbt."
        data_tests:
          - not_null

      - name: annualization_multiplier
        description: "The multiplier applied to a value to produce an annualized figure. Always 4 for quarterly data."
        data_tests:
          - not_null

  - name: dim_sources
    description: "Dimension table of data sources used in the pipeline."
    columns:
      - name: source_code
        description: "A short identifier for the data source, serving as the primary key."
        data_tests:
          - unique
          - not_null

      - name: publisher
        description: "The full name of the organisation that publishes the dataset."
        data_tests:
          - not_null

      - name: publisher_short
        description: "An abbreviated name for the publisher."
        data_tests:
          - not_null

      - name: dataset
        description: "The full name of the dataset."
        data_tests:
          - not_null

      - name: dataset_short
        description: "An abbreviated name for the dataset."
        data_tests:
          - not_null

      - name: url
        description: "A URL linking to the dataset's source page."

      - name: processed_at
        description: "The timestamp when this dimension row was processed in dbt."
        data_tests:
          - not_null

  - name: dim_date
    description: "Date dimension with daily granularity and standardized calendar and Australian financial-year attributes."
    columns:
      - name: date_day
        description: "The calendar date, serving as the primary key."
        data_tests:
          - unique
          - not_null

      - name: date_year
        description: "Calendar year."
        data_tests:
          - not_null

      - name: date_month
        description: "Calendar month number (1-12)."
        data_tests:
          - not_null

      - name: date_quarter
        description: "Calendar quarter number (1-4)."
        data_tests:
          - not_null

      - name: is_quarter_end
        description: "True when date_day is the final day of a calendar quarter."
        data_tests:
          - not_null

      - name: year_quarter
        description: "Canonical quarter key in YYYY-QN format for easy grouping."
        data_tests:
          - not_null

      - name: financial_quarter
        description: "Australian financial quarter number (Q1=Jul-Sep, Q2=Oct-Dec, Q3=Jan-Mar, Q4=Apr-Jun)."
        data_tests:
          - not_null

      - name: financial_year
        description: "Australian financial year label, where dates from Jul-Jun map to the ending year."
        data_tests:
          - not_null

      - name: processed_at
        description: "The timestamp when this dimension row was processed in dbt."
        data_tests:
          - not_null
