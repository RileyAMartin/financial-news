version: 2

models:
  - name: fct_economics
    description: "Currency-neutral fact table of quarterly national economic accounts data, storing annualized local-currency values with direct currency keys and standardized date keys."
    columns:
      - name: country_code
        description: "The 3-letter country code for this row."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_countries')
                field: country_code

      - name: currency_code
        description: "The ISO 4217 local currency code for this country-quarter observation."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_currencies')
                field: currency_code

      - name: indicator_code
        description: "The IMF indicator code identifying the economic measure."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_indicators')
                field: indicator_code

      - name: source_code
        description: "The identifier of the data source for this row."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_sources')
                field: source_code

      - name: date_day
        description: "The standardized calendar date key for this quarterly observation (quarter-end date)."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day

      - name: frequency
        description: "The frequency of the observation. Always 'Q' (quarterly)."
        data_tests:
          - not_null

      - name: is_inflation_adjusted
        description: "True if the value is adjusted for inflation (constant prices); False if it represents current prices."
        data_tests:
          - not_null

      - name: ingested_at
        description: "The timestamp when this record was originally loaded into BigQuery."
        data_tests:
          - not_null

      - name: value_local
        description: "The annualized value in the local currency."

  - name: fct_fx
    description: "Fact table of daily FX rates to USD, including OHLC prices, used for currency conversion in downstream serving layers and reverse ETL."
    columns:
      - name: base_currency_code
        description: "The ISO 4217 base currency code being converted to quote currency units."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_currencies')
                field: currency_code

      - name: quote_currency_code
        description: "The ISO 4217 quote currency code. In this model, it is expected to be USD."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_currencies')
                field: currency_code

      - name: date_day
        description: "The standardized calendar date key from dim_date for this daily FX observation."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day

      - name: open_price
        description: "Opening FX price for the day."
        data_tests:
          - not_null

      - name: high_price
        description: "Highest FX price for the day."
        data_tests:
          - not_null

      - name: low_price
        description: "Lowest FX price for the day."
        data_tests:
          - not_null

      - name: close_price
        description: "Closing FX price for the day; preferred rate for downstream conversion logic."
        data_tests:
          - not_null

  - name: fct_news
    description: "Fact table of RSS news articles that have been successfully matched to at least one country."
    columns:
      - name: ingested_at
        description: "The timestamp when this article was originally loaded into BigQuery."
        data_tests:
          - not_null

      - name: url
        description: "The unique URL of the article, serving as the natural primary key."
        data_tests:
          - unique
          - not_null

      - name: feed_name
        description: "The name of the RSS feed source."
        data_tests:
          - not_null

      - name: title
        description: "The headline of the news article."
        data_tests:
          - not_null

      - name: summary
        description: "A short summary or snippet of the article content."

      - name: published_at
        description: "Timestamp when the article was published by the source."
        data_tests:
          - not_null

      - name: date_day
        description: "The standardized calendar date key from dim_date derived from published_at."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_day

      - name: country_codes
        description: "An array of country codes matched from the article's title and summary (e.g., ['AUS', 'USA'])."
        data_tests:
          - not_null
