version: 2

models:
  - name: int_imf_qnea_filtered
    description: "QNEA data filtered to relevant indicators (exports, imports, trade balance, and GDP) and valid country codes, with annualization metadata joined in."
    columns:
      - name: country_code
        description: "The 3-letter abbreviated country code for this value."
        data_tests:
          - not_null

      - name: indicator_code
        description: "The IMF indicator code, filtered to those present in the `imf_qnea_indicators` seed."
        data_tests:
          - not_null

      - name: period_end_date
        description: "The date of the last day of this row's quarter."
        data_tests:
          - not_null

      - name: frequency
        description: "The frequency of the observation. Always 'Q' (quarterly)."
        data_tests:
          - not_null

      - name: obs_value
        description: "The seasonally adjusted observed value in the local currency."
        data_tests:
          - not_null

      - name: is_inflation_adjusted
        description: "True if the observed value is adjusted for inflation (constant prices); False if it represents current prices."
        data_tests:
          - not_null

      - name: annualization_multiplier
        description: "The multiplier required to convert this indicator's quarterly value to an annualized figure. Sourced from the `imf_qnea_indicators` seed."
        data_tests:
          - not_null

      - name: source_code
        description: "The identifier for the data source. Always 'IMF_QNEA', corresponding to the entry in the `data_sources` seed."
        data_tests:
          - not_null

      - name: ingested_at
        description: "The timestamp when this record was originally loaded into BigQuery."
        data_tests:
          - not_null

  - name: int_news_country_tags
    description: "Intermediate model that matches news articles against country keywords to produce a list of country codes associated with each article."
    columns:
      - name: url
        description: "The unique URL of the article, matching the natural primary key in stg_news."
        data_tests:
          - not_null
          - unique

      - name: ingested_at
        description: "The timestamp when this article was originally loaded into BigQuery."
        data_tests:
          - not_null

      - name: country_codes
        description: "An array of distinct country codes matched from the article's title and summary text."
        data_tests:
          - not_null