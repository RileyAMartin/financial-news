name: 'financial_news'
version: '1.0.0'
config-version: 2

profile: 'financial_news'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  financial_news:
    staging:
      +materialized: view
      stg_imf_qnea:
        +tags: ["economics", "daily"]
      stg_news:
        +tags: ["hourly", "news"]
    intermediate:
      +materialized: view
      int_news_country_tags:
        +tags: ["hourly", "news"]
    marts:
      +materialized: table
      facts:
        fct_news:
          +tags: ["hourly", "news"]
        fct_economics:
          +tags: ["daily", "economics"]
      dimensions:
        +tags: ["daily", "dimensions"]

flags:
  bigquery_use_batch_source_freshness: True