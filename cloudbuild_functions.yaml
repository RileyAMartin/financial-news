steps:

- name: 'bash'
  args: ['cp', '-r', './common', './functions/imf_qnea/common']

- name: 'bash'
  args: ['cp', '-r', './common', './functions/imf_fx/common']

- name: 'google/cloud-sdk'
  args:
  - gcloud
  - functions
  - deploy
  - imf-qnea-ingestor
  - --gen2
  - --region=australia-southeast2
  - --runtime=python310
  - --source=./functions/imf_qnea
  - --entry-point=ingest_imf_qnea_data
  - --trigger-http
  - --no-allow-unauthenticated
  - --memory=1024Mi
  - --timeout=540s

- name: 'google/cloud-sdk'
  args:
  - gcloud
  - functions
  - deploy
  - imf-fx-ingestor
  - --gen2
  - --region=australia-southeast2
  - --runtime=python310
  - --source=./functions/imf_fx
  - --entry-point=ingest_imf_fx_data
  - --trigger-http
  - --no-allow-unauthenticated
  - --memory=1024Mi
  - --timeout=540s

- name: 'google/cloud-sdk'
  args:
  - gcloud
  - functions
  - deploy
  - rss-ingestor
  - --gen2
  - --region=australia-southeast2
  - --runtime=python310
  - --source=./functions/rss
  - --entry-point=ingest_rss
  - --trigger-http
  - --no-allow-unauthenticated

- name: 'google/cloud-sdk'
  args:
  - gcloud
  - functions
  - deploy
  - reverse-etl
  - --gen2
  - --region=australia-southeast2
  - --runtime=python310
  - --source=./functions/reverse_etl
  - --entry-point=reverse_etl
  - --trigger-http
  - --no-allow-unauthenticated
  - --memory=1024Mi
  - --timeout=720s
  - --set-secrets=DB_URL=projects/international-finance-484205/secrets/COCKROACH_DB_URL:latest
  - --set-secrets=etc/secrets/root.crt=projects/international-finance-484205/secrets/COCKROACH_DB_CERT:latest

options:
  logging: CLOUD_LOGGING_ONLY